<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceOS — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/dashboard.css" />
  <style>
    .tab-toggle { display:flex; background:rgba(255,255,255,0.05); border-radius:8px; padding:4px; margin-bottom:1.5rem; gap:4px; }
    .tab-btn { flex:1; padding:9px; border:none; border-radius:6px; font-weight:600; cursor:pointer; font-size:0.9rem; transition:all 0.2s; }
    .tab-btn.active { background:var(--accent, #00e5a0); color:#000; }
    .tab-btn.inactive { background:transparent; color:var(--text-muted, #888); }
    .tab-btn.inactive:hover { color:#fff; }
  </style>
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="login-grid-lines"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-brand">
        <span class="brand-mark">F</span>
        <span class="brand-name">FinanceOS</span>
      </div>

      <!-- TABS -->
      <div class="tab-toggle">
        <button id="tabLogin" class="tab-btn active">Sign In</button>
        <button id="tabRegister" class="tab-btn inactive">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginView" style="margin-top:0.75rem;">
        <div id="loginError" class="alert alert--error" style="display:none"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@finance.dev" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn--primary btn--full" id="loginBtn">Sign In</button>
        <div class="login-hint">
          <span>Demo accounts:</span>
          <code>admin@finance.dev</code> · <code>analyst@finance.dev</code> · <code>viewer@finance.dev</code><br/>
          <span>Password pattern: <code>Role@1234</code> (e.g. <code>Admin@1234</code>)</span>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerView" style="display:none; margin-top:0.75rem;">
        <div id="registerError" class="alert alert--error" style="display:none"></div>
        <div id="registerSuccess" class="alert alert--success" style="display:none"></div>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="regName" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min. 6 characters" />
        </div>
        <button class="btn btn--primary btn--full" id="registerBtn">Create Account</button>
      </div>

    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
